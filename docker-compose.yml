services:
  mysql:
    image: mysql:8.0
    restart: unless-stopped

    env_file:
      - .env.production

    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}

    ports:
      - "3306:3306"

    volumes:
      - mysql_data:/var/lib/mysql

    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-p${MYSQL_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    restart: unless-stopped

    ports:
      - "6379:6379"

    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

  api:
    build: .
    restart: unless-stopped

    env_file:
      - .env.production

    ports:
      - "${APP_PORT:-8000}:8000"

    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy

    volumes:
      - ./uploads:/app/uploads
      - ./recordings:/app/recordings
      - ./transcripts:/app/transcripts
      - ./logs:/app/logs
      - ./chroma_db:/app/chroma_db

  celery_worker:
    build: .
    restart: unless-stopped

    command: celery -A app.workers.celery_app worker --loglevel=info --concurrency=2

    env_file:
      - .env.production

    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy

    volumes:
      - ./uploads:/app/uploads
      - ./recordings:/app/recordings
      - ./transcripts:/app/transcripts
      - ./logs:/app/logs
      - ./chroma_db:/app/chroma_db

volumes:
  mysql_data: